kind = "web"
previewPath = "/"
title = "Graph RAG Intelligence Platform"
version = "1.0.0"
id = "artifacts/graph-rag-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24578

[services.development]
run = "pnpm --filter @workspace/graph-rag-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/graph-rag-ui", "run", "build" ]
publicDir = "artifacts/graph-rag-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24578"
BASE_PATH = "/"
